<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝师父生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'SimSun', serif;
        }
        
        @media (max-width: 768px) {
            .main-title {
                font-size: 36px !important;
            }
            .subtitle {
                font-size: 20px !important;
            }
            .start-button {
                font-size: 24px !important;
                padding: 18px 50px !important;
            }
            .countdown-number {
                font-size: 180px !important;
            }
        }
        
        .container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        
        .screen.active {
            display: flex;
        }
        
        .start-screen {
            background: #0a0a20;
            position: relative;
            overflow: hidden;
        }
        
        .start-content {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .main-title {
            font-size: 80px;
            color: #ffffff;
            margin-bottom: 30px;
            letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        
        .subtitle {
            font-size: 28px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 50px;
            letter-spacing: 8px;
        }
        
        .start-button {
            padding: 20px 70px;
            font-size: 32px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 5px;
            backdrop-filter: blur(5px);
        }
        
        .start-button:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        
        .countdown-screen {
            background: #0a0a20;
            position: relative;
            overflow: hidden;
        }
        
        .countdown-number {
            font-size: 280px;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 20px;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
        }
        
        .fireworks-screen {
            background: #0a0a20;
        }
        
        .final-screen {
            background: #0a0a20;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .final-content {
            position: relative;
            z-index: 2;
        }
        
        .restart-button {
            position: fixed;
            top: 20px;
            left: 20px;
            margin-top: 0;
            padding: 12px 30px;
            font-size: 18px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 3px;
            opacity: 0;
            backdrop-filter: blur(5px);
            z-index: 200;
        }
        
        .restart-button.show {
            opacity: 1;
        }
        
        .restart-button:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.3);
        }

        .popup-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .popup-container.show {
            display: flex;
        }

        .popup-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .popup {
            background: linear-gradient(145deg, #ffeef8 0%, #ffd6e8 100%);
            border-radius: 15px;
            padding: 12px 16px;
            color: #333;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: scale(0.5) translateY(-20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            pointer-events: auto;
            position: relative;
            min-width: 80px;
            max-width: 140px;
            text-align: center;
        }

        .popup.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .popup:hover {
            transform: scale(1.05) !important;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .popup-container {
                gap: 12px;
            }
            
            .popup-row {
                gap: 8px;
                flex-wrap: nowrap;
                justify-content: center;
            }
            
            .popup {
                padding: 8px 10px;
                font-size: 10px;
                min-width: 55px;
                max-width: 90px;
                border-radius: 12px;
            }
        }

        .popup-close-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            z-index: 101;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .popup-close-hint.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <canvas id="fireworksCanvas"></canvas>
        
        <div class="screen start-screen active" id="screen1">
            <div class="start-content">
                <h1 class="main-title">生日快乐</h1>
                <p class="subtitle">师父 · 万事胜意</p>
                <button class="start-button" onclick="startCountdown()">点击开启</button>
            </div>
        </div>
        
        <div class="screen countdown-screen" id="screen2">
            <div class="countdown-number" id="countdown">5</div>
        </div>
        
        <div class="screen fireworks-screen" id="screen3">
        </div>
        
        <div class="screen final-screen" id="screen5">
            <div class="final-content">
                <button class="restart-button" id="restartBtn" onclick="restartAnimation()">再看一次</button>
            </div>
        </div>

        <div class="popup-container" id="popupContainer">
        </div>

        <div class="popup-close-hint" id="popupHint">点击弹窗或下方按钮关闭</div>
    </div>
    
    <audio id="bgMusic" loop>
            <source src="birthday_music.mp3.mp3" type="audio/mpeg">
        </audio>
        
        <img id="colorBallImg" style="display: none;" src="彩色球.png">
        
        <div id="musicControls" style="position: fixed; top: 20px; right: 20px; z-index: 1000; opacity: 0; transition: opacity 0.3s;">
            <button onclick="toggleMusic()" id="musicBtn" style="background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 16px; backdrop-filter: blur(5px);">🎵 播放音乐</button>
        </div>
    
    <script>
        let currentScreen = 1;
        let isMusicPlaying = false;
        let popupsShown = false;
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fireworks = [];
        let animationId = null;
        
        let currentTextParticles = [];
        let stars = [];
        let cakes = [];
        let colorBalls = [];
        
        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('musicBtn');
            
            if (isMusicPlaying) {
                audio.pause();
                btn.textContent = '🎵 播放音乐';
                isMusicPlaying = false;
            } else {
                audio.play().then(() => {
                    btn.textContent = '🎵 暂停音乐';
                    isMusicPlaying = true;
                }).catch(err => {
                    console.log('无法播放音乐:', err);
                    alert('请点击页面任意位置后，再点击播放音乐按钮');
                });
            }
        }
        
        function showMusicControls() {
            document.getElementById('musicControls').style.opacity = '1';
        }
        
        class Cake {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.speed = 1 + Math.random() * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.size = 20 + Math.random() * 20;
                this.alpha = 1;
                this.swingAmplitude = 30 + Math.random() * 30;
                this.swingSpeed = 0.02 + Math.random() * 0.02;
                this.swingOffset = Math.random() * Math.PI * 2;
                this.swingTime = 0;
            }
            
            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                this.swingTime += this.swingSpeed;
                
                if (this.y > canvas.height + 50) {
                    this.alpha = 0;
                }
            }
            
            draw() {
                if (this.alpha <= 0) return;
                
                const swingX = Math.sin(this.swingTime + this.swingOffset) * this.swingAmplitude;
                
                ctx.save();
                ctx.translate(this.x + swingX, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;
                
                const s = this.size;
                
                // 蛋糕底层
                ctx.fillStyle = '#FFE4B5';
                ctx.beginPath();
                ctx.roundRect(-s/2, 0, s, s/3, 3);
                ctx.fill();
                
                // 蛋糕中层
                ctx.fillStyle = '#FFB6C1';
                ctx.beginPath();
                ctx.roundRect(-s/2.5, -s/4, s/1.25, s/3, 3);
                ctx.fill();
                
                // 蛋糕顶层
                ctx.fillStyle = '#FFFACD';
                ctx.beginPath();
                ctx.roundRect(-s/3, -s/2, s/1.5, s/4, 3);
                ctx.fill();
                
                // 蜡烛
                ctx.fillStyle = '#FF6B6B';
                ctx.fillRect(-1, -s/1.5, 2, s/4);
                
                // 蜡烛火焰
                ctx.fillStyle = '#FFD93D';
                ctx.beginPath();
                ctx.arc(0, -s/1.5 - 3, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        class ColorBall {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.speed = 1 + Math.random() * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.size = 20 + Math.random() * 20;
                this.alpha = 1;
                this.swingAmplitude = 30 + Math.random() * 30;
                this.swingSpeed = 0.02 + Math.random() * 0.02;
                this.swingOffset = Math.random() * Math.PI * 2;
                this.swingTime = 0;
            }
            
            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                this.swingTime += this.swingSpeed;
                
                if (this.y > canvas.height + 80) {
                    this.alpha = 0;
                }
            }
            
            draw() {
                if (this.alpha <= 0) return;
                
                const swingX = Math.sin(this.swingTime + this.swingOffset) * this.swingAmplitude;
                const img = document.getElementById('colorBallImg');
                
                if (!img.complete || img.naturalWidth === 0) return;
                
                ctx.save();
                ctx.translate(this.x + swingX, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;
                
                const s = this.size * 5;
                const w = img.naturalWidth;
                const h = img.naturalHeight;
                const scale = s / Math.max(w, h);
                const drawWidth = w * scale;
                const drawHeight = h * scale;
                
                ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                
                ctx.restore();
            }
        }
        
        function spawnObjects() {
            if (currentScreen === 5) {
                if (Math.random() > 0.5) {
                    cakes.push(new Cake());
                }
                if (Math.random() > 0.3) {
                    colorBalls.push(new ColorBall());
                }
            }
        }
        
        let cakeSpawnInterval;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            console.log('Canvas resized to:', canvas.width, 'x', canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            currentTextParticles = [];
        });
        
        const colorPalettes = [
            {colors: ['#FFD700', '#FFA500', '#FF6347']},
            {colors: ['#FF69B4', '#FF1493', '#FF69B4']},
            {colors: ['#50C878', '#3CB371', '#2E8B57']},
            {colors: ['#4169E1', '#6495ED', '#87CEEB']},
            {colors: ['#9966CC', '#DA70D6', '#EE82EE']},
            {colors: ['#FF6347', '#FF4500', '#FF7F50']},
            {colors: ['#00CED1', '#20B2AA', '#48D1CC']},
            {colors: ['#FF1493', '#C71585', '#DB7093']}
        ];
        
        class Firework {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width * 0.9 + canvas.width * 0.05;
                this.y = canvas.height;
                this.targetY = canvas.height * 0.1 + Math.random() * canvas.height * 0.3;
                this.speed = 8 + Math.random() * 6;
                this.alive = true;
                this.trail = [];
                this.trailTimer = 0;
                this.age = 0;
                
                this.palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
                this.color = this.palette.colors[0];
            }
            
            update() {
                this.age++;
                
                this.trailTimer++;
                if (this.trailTimer % 3 === 0) {
                    this.trail.push({
                        x: this.x,
                        y: this.y,
                        alpha: 1,
                        size: 2 + Math.random()
                    });
                }
                
                if (this.trail.length > 20) {
                    this.trail.shift();
                }
                
                this.trail.forEach((point, i) => {
                    point.alpha = (i / this.trail.length) * 0.8;
                    point.y += 2;
                });
                
                this.y -= this.speed;
                this.speed *= 0.985;
                
                if (this.y <= this.targetY || this.age > 200) {
                    this.explode();
                    this.alive = false;
                }
            }
            
            draw() {
                this.trail.forEach((point, i) => {
                    const size = point.size * (i / this.trail.length);
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${point.alpha})`;
                    ctx.fill();
                });
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 15);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                gradient.addColorStop(0.3, 'rgba(255, 255, 200, 0.8)');
                gradient.addColorStop(0.6, 'rgba(255, 200, 100, 0.4)');
                gradient.addColorStop(1, 'rgba(255, 150, 50, 0)');
                ctx.beginPath();
                ctx.arc(this.x, this.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            explode() {
                const particleCount = 80 + Math.floor(Math.random() * 40);
                const mainColor = this.palette.colors[0];
                const secondaryColor = this.palette.colors[1];
                const accentColor = this.palette.colors[2];
                
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 / particleCount) * i + Math.random() * 0.3;
                    const speed = 2 + Math.random() * 5;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    
                    const colorChoice = Math.random();
                    let color;
                    if (colorChoice < 0.5) {
                        color = mainColor;
                    } else if (colorChoice < 0.85) {
                        color = secondaryColor;
                    } else {
                        color = accentColor;
                    }
                    
                    const particle = new Particle(
                        this.x, 
                        this.y, 
                        vx, 
                        vy, 
                        color,
                        'main'
                    );
                    particle.gravity = 0.08 + Math.random() * 0.03;
                    particle.friction = 0.96 + Math.random() * 0.02;
                    particles.push(particle);
                }
                
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 2;
                    const particle = new Particle(
                        this.x, 
                        this.y, 
                        Math.cos(angle) * speed, 
                        Math.sin(angle) * speed, 
                        '#FFFFFF',
                        'spark'
                    );
                    particles.push(particle);
                }
                
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI * 2 / 6) * i;
                    const speed = 1 + Math.random() * 2;
                    const particle = new Particle(
                        this.x, 
                        this.y, 
                        Math.cos(angle) * speed, 
                        Math.sin(angle) * speed, 
                        mainColor,
                        'streak'
                    );
                    particles.push(particle);
                }
                
                const flash = new Flash(this.x, this.y, mainColor);
                particles.push(flash);
            }
        }
        
        class Particle {
            constructor(x, y, vx, vy, color, type) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.type = type;
                this.alpha = 1;
                this.decay = type === 'spark' ? 0.08 : 0.015;
                this.gravity = 0.08;
                this.friction = 0.96;
                this.size = type === 'spark' ? 1.5 : 2;
                this.trail = [];
                this.flickerTimer = Math.random() * 100;
            }
            
            update() {
                if (this.type === 'main' && Math.random() > 0.6) {
                    this.trail.push({x: this.x, y: this.y, alpha: 0.6, size: this.size * 0.8});
                    if (this.trail.length > 8) {
                        this.trail.shift();
                    }
                }
                
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                
                this.flickerTimer += 0.4;
                const flicker = Math.sin(this.flickerTimer) * 0.15 + 0.85;
                
                this.alpha -= this.decay * flicker;
                
                if (this.y > canvas.height - 10) {
                    this.vy *= -0.2;
                    this.vx *= 0.7;
                    this.y = canvas.height - 10;
                    this.alpha -= 0.03;
                }
            }
            
            draw() {
                this.trail.forEach((point, i) => {
                    const trailAlpha = point.alpha * (i / this.trail.length) * this.alpha;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, point.size * (i / this.trail.length), 0, Math.PI * 2);
                    let color = this.color;
                    if (color.startsWith('#')) {
                        const r = parseInt(color.slice(1, 3), 16);
                        const g = parseInt(color.slice(3, 5), 16);
                        const b = parseInt(color.slice(5, 7), 16);
                        color = `rgba(${r}, ${g}, ${b}, ${trailAlpha})`;
                    }
                    ctx.fillStyle = color;
                    ctx.fill();
                });
                
                let fillColor = this.color;
                if (this.color.startsWith('#')) {
                    const r = parseInt(this.color.slice(1, 3), 16);
                    const g = parseInt(this.color.slice(3, 5), 16);
                    const b = parseInt(this.color.slice(5, 7), 16);
                    fillColor = `rgba(${r}, ${g}, ${b}, ${this.alpha})`;
                }
                
                if (this.type === 'streak') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = fillColor;
                    ctx.fill();
                } else {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                    let baseColor = fillColor;
                    gradient.addColorStop(0, baseColor);
                    gradient.addColorStop(0.5, baseColor);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = fillColor;
                    ctx.fill();
                }
            }
        }
        
        class Flash {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.alpha = 1;
                this.size = 10;
                this.type = 'flash';
            }
            
            update() {
                this.alpha -= 0.08;
                this.size += 8;
            }
            
            draw() {
                if (this.alpha <= 0) return;
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                
                let color = this.color;
                if (color.startsWith('#')) {
                    const r = parseInt(color.slice(1, 3), 16);
                    const g = parseInt(color.slice(3, 5), 16);
                    const b = parseInt(color.slice(5, 7), 16);
                    gradient.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${this.alpha * 0.8})`);
                    gradient.addColorStop(1, 'rgba(255, 200, 100, 0)');
                }
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        class TextParticle {
            constructor(targetX, targetY, startX, startY, color) {
                this.targetX = targetX;
                this.targetY = targetY;
                this.x = startX;
                this.y = startY;
                this.startX = startX;
                this.startY = startY;
                this.color = color;
                
                let baseSize;
                if (canvas.width < 375) {
                    baseSize = 0.8;
                } else if (canvas.width < 480) {
                    baseSize = 1;
                } else if (canvas.width < 768) {
                    baseSize = 1.2;
                } else if (canvas.width < 1920) {
                    baseSize = 1.5;
                } else {
                    baseSize = 2;
                }
                this.size = baseSize + Math.random() * 0.3;
                
                this.alpha = 0;
                this.targetAlpha = 1;
                let baseSpeed = 0.008;
                if (canvas.width >= 1920) {
                    baseSpeed = 0.012;
                } else if (canvas.width >= 768) {
                    baseSpeed = 0.01;
                }
                this.speed = baseSpeed + Math.random() * 0.004;
                this.progress = 0;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.015 + Math.random() * 0.01;
                this.settled = false;
                this.settledTime = 0;
            }
            
            update() {
                if (!this.settled) {
                    this.progress += this.speed;
                    
                    if (this.progress >= 1) {
                        this.progress = 1;
                        this.settled = true;
                    }
                    
                    const easeProgress = 1 - Math.pow(1 - this.progress, 3);
                    
                    const wobbleX = Math.sin(this.wobble) * 10 * (1 - this.progress);
                    const wobbleY = Math.cos(this.wobble) * 10 * (1 - this.progress);
                    
                    this.x = this.startX + (this.targetX - this.startX) * easeProgress + wobbleX;
                    this.y = this.startY + (this.targetY - this.startY) * easeProgress + wobbleY;
                    
                    this.alpha = this.targetAlpha * easeProgress;
                    this.wobble += this.wobbleSpeed;
                } else {
                    this.settledTime++;
                    // 稳定更长时间，每一句停留5秒
                    if (this.settledTime > 500) {
                        this.alpha -= 0.01;
                    }
                }
            }
            
            draw() {
                if (this.alpha <= 0) return;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

                let fillColor = this.color;
                if (this.color.startsWith('#')) {
                    const r = parseInt(this.color.slice(1, 3), 16);
                    const g = parseInt(this.color.slice(3, 5), 16);
                    const b = parseInt(this.color.slice(5, 7), 16);
                    fillColor = `rgba(${r}, ${g}, ${b}, ${this.alpha})`;
                }

                ctx.fillStyle = fillColor;
                ctx.fill();
            }
        }
        
        function initStars() {
            stars = [];
            for (let i = 0; i < 250; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.05 + 0.02
                });
            }
        }
        initStars();
        
        function drawStars() {
            stars.forEach(star => {
                star.twinkle += star.speed;
                const alpha = 0.4 + Math.sin(star.twinkle) * 0.4;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, alpha)})`;
                ctx.fill();
            });
        }
        
        function getTextPixels(text, fontSize) {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            
            tempCtx.font = `bold ${fontSize}px Microsoft YaHei, SimHei, sans-serif`;
            tempCtx.fillStyle = '#ffffff';
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
            tempCtx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const imageData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = [];
            const data = imageData.data;
            
            // 采样间隔 - 更小的间隔，更多粒子
            let gap = canvas.width < 768 ? 1 : 2;
            
            for (let y = 0; y < canvas.height; y += gap) {
                for (let x = 0; x < canvas.width; x += gap) {
                    const index = (y * canvas.width + x) * 4;
                    if (data[index + 3] > 100) {
                        pixels.push({
                            x: x,
                            y: y
                        });
                    }
                }
            }
            
            return pixels;
        }
        
        function createTextParticles(text) {
            currentTextParticles = [];
            let fontSize;
            const screenWidth = canvas.width;
            if (screenWidth < 320) {
                fontSize = 40;
            } else if (screenWidth < 375) {
                fontSize = 48;
            } else if (screenWidth < 414) {
                fontSize = 54;
            } else if (screenWidth < 480) {
                fontSize = 60;
            } else if (screenWidth < 640) {
                fontSize = 70;
            } else if (screenWidth < 768) {
                fontSize = 80;
            } else if (screenWidth < 1920) {
                fontSize = 100;
            } else {
                fontSize = 120;
            }
            const pixels = getTextPixels(text, fontSize);

            const colors = ['#ffffff', '#f0f0f0', '#e0e0e0'];

            // 更宽松的采样，确保有足够粒子
            const step = screenWidth < 768 ? 1 : 2;

            for (let i = 0; i < pixels.length; i += step) {
                const pixel = pixels[i];
                const delay = Math.random() * 600;
                setTimeout(() => {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 150 + Math.random() * 100;
                    const startX = pixel.x + Math.cos(angle) * distance;
                    const startY = pixel.y + Math.sin(angle) * distance;

                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const particle = new TextParticle(pixel.x, pixel.y, startX, startY, color);
                    currentTextParticles.push(particle);
                }, delay);
            }
        }
        
        function drawTextParticles() {
            for (let i = currentTextParticles.length - 1; i >= 0; i--) {
                const particle = currentTextParticles[i];
                particle.update();
                if (particle.alpha > 0.01) {
                    particle.draw();
                } else {
                    currentTextParticles.splice(i, 1);
                }
            }
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 32, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawStars();
            
            if (currentScreen === 5) {
                drawTextParticles();
                
                cakes.forEach(cake => {
                    cake.update();
                    if (cake.alpha > 0) {
                        cake.draw();
                    }
                });
                cakes = cakes.filter(c => c.alpha > 0);
                
                colorBalls.forEach(ball => {
                    ball.update();
                    if (ball.alpha > 0) {
                        ball.draw();
                    }
                });
                colorBalls = colorBalls.filter(b => b.alpha > 0);
            }
            
            fireworks = fireworks.filter(fw => {
                fw.update();
                if (fw.alive) {
                    fw.draw();
                    return true;
                }
                return false;
            });
            
            particles = particles.filter(p => {
                p.update();
                if (p.alpha > 0 && p.type !== 'flash') {
                    p.draw();
                    return true;
                } else if (p.type === 'flash' && p.alpha > 0) {
                    p.draw();
                    return true;
                }
                return false;
            });
            
            if (particles.length > 500) {
                particles = particles.slice(-500);
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        function startAnimation() {
            if (!animationId) {
                ctx.fillStyle = 'rgba(10, 10, 32, 1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                animate();
            }
        }
        
        let fireworkInterval;
        let fireworkEndTime;
        
        function launchFireworks() {
            document.getElementById('screen2').style.display = 'none';
            document.getElementById('screen3').style.display = 'flex';
            currentScreen = 3;
            
            fireworks = [];
            particles = [];
            startAnimation();
            
            const launches = [
                {time: 0, count: 4},
                {time: 600, count: 5},
                {time: 1200, count: 4},
                {time: 1800, count: 5},
                {time: 2400, count: 6},
                {time: 3000, count: 5},
                {time: 3600, count: 6}
            ];
            
            launches.forEach(launch => {
                setTimeout(() => {
                    for (let i = 0; i < launch.count; i++) {
                        setTimeout(() => {
                            fireworks.push(new Firework());
                        }, i * 120);
                    }
                }, launch.time);
            });
            
            fireworkEndTime = Date.now() + 7500;
            
            fireworkInterval = setInterval(() => {
                if (currentScreen === 3 && Date.now() < fireworkEndTime) {
                    fireworks.push(new Firework());
                }
            }, 500);
            
            setTimeout(showFinal, 7500);
        }
        
        function showScreen(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + num).classList.add('active');
            currentScreen = num;
        }
        
        function startCountdown() {
            showMusicControls();
            
            const audio = document.getElementById('bgMusic');
            audio.play().then(() => {
                document.getElementById('musicBtn').textContent = '🎵 暂停音乐';
                isMusicPlaying = true;
            }).catch(() => {
                console.log('需要用户交互才能播放音乐');
            });
            
            let count = 5;
            const countdownEl = document.getElementById('countdown');
            countdownEl.textContent = count;
            countdownEl.style.opacity = '1';
            showScreen(2);
            
            const interval = setInterval(() => {
                count--;
                if (count >= 0) {
                    countdownEl.textContent = count;
                }
                
                if (count < 0) {
                    clearInterval(interval);
                    countdownEl.style.opacity = '0';
                    setTimeout(() => {
                        launchFireworks();
                    }, 200);
                }
            }, 1000);
        }
        
        function showFinal() {
            if (fireworkInterval) {
                clearInterval(fireworkInterval);
                fireworkInterval = null;
            }
            
            fireworks = [];
            particles = [];
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            document.getElementById('screen3').style.display = 'none';
            showScreen(5);
            
            ctx.fillStyle = 'rgba(10, 10, 32, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            startAnimation();
            
            cakeSpawnInterval = setInterval(spawnObjects, 200);
            
            const messages = [
                { text: '愿师父', delay: 0 },
                { text: '笑口常开', delay: 7000 },
                { text: '青春永驻', delay: 14000 },
                { text: '所愿皆所得', delay: 21000 },
                { text: '十连出十个八音', delay: 28000 },
                { text: '祝师父生日快乐', delay: 35000 }
            ];
            
            messages.forEach(msg => {
                setTimeout(() => {
                    createTextParticles(msg.text);
                }, msg.delay);
            });

            setTimeout(() => {
                document.getElementById('restartBtn').classList.add('show');
            }, 45000);

            setTimeout(() => {
                showCaringPopups();
            }, 48000);
        }

        function showCaringPopups() {
            if (popupsShown) return;
            popupsShown = true;

            const popupContainer = document.getElementById('popupContainer');
            const popupHint = document.getElementById('popupHint');

            const messages = [
                "今天过得开心嘛",
                "别太累啦，偶尔偷懒也好",
                "记得好好护肤",
                "天冷了，多穿衣服",
                "珍惜每一刻",
                "你超棒的",
                "顺顺利利",
                "好好爱自己",
                "保持好心情",
                "要相信自己奥",
                "早点休息",
                "记得吃水果",
                "梦想成真",
                "愿所有烦恼都消失",
                "每天都要元气满满",
                "多喝水哦~",
                "学会爱自己，才能更好地爱别人"
            ];

            popupContainer.innerHTML = '';
            popupContainer.classList.add('show');

            const colors = [
                'linear-gradient(145deg, #ffeef8 0%, #ffd6e8 100%)',
                'linear-gradient(145deg, #f0f9ff 0%, #d6ecff 100%)',
                'linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%)',
                'linear-gradient(145deg, #fffbeb 0%, #fef3c7 100%)',
                'linear-gradient(145deg, #faf5ff 0%, #f3e8ff 100%)',
                'linear-gradient(145deg, #fef3c7 0%, #fde68a 100%)',
                'linear-gradient(145deg, #fce7f3 0%, #fbcfe8 100%)',
                'linear-gradient(145deg, #eff6ff 0%, #dbeafe 100%)'
            ];

            const screenWidth = window.innerWidth;
            const isMobile = screenWidth < 768;

            // 蛋糕层: 从上到下，越来越宽
            let cakeLayers;
            if (isMobile) {
                cakeLayers = [2, 3, 5, 7];
            } else {
                cakeLayers = [2, 4, 5, 6];
            }

            const baseDelay = isMobile ? 100 : 150;
            let totalDelay = 0;
            let msgIdx = 0;

            // 创建所有行
            const rows = [];
            for (let i = 0; i < cakeLayers.length; i++) {
                const row = document.createElement('div');
                row.className = 'popup-row';
                popupContainer.appendChild(row);
                rows.push(row);
            }

            // 从顶层开始填充
            for (let rowIdx = 0; rowIdx < cakeLayers.length && msgIdx < messages.length; rowIdx++) {
                const countInRow = cakeLayers[rowIdx];
                const currentRow = rows[rowIdx];

                for (let i = 0; i < countInRow && msgIdx < messages.length; i++) {
                    const msg = messages[msgIdx];
                    const delay = totalDelay + i * baseDelay;
                    const colorIdx = msgIdx % colors.length;

                    setTimeout(() => {
                        const popup = document.createElement('div');
                        popup.className = 'popup';
                        popup.textContent = msg;
                        popup.style.background = colors[colorIdx];

                        popup.addEventListener('click', () => {
                            popup.style.transform = 'scale(0) translateY(20px)';
                            popup.style.opacity = '0';
                            setTimeout(() => popup.remove(), 300);

                            const remaining = document.querySelectorAll('.popup.show').length;
                            if (remaining <= 1) {
                                hidePopups();
                            }
                        });

                        currentRow.appendChild(popup);

                        requestAnimationFrame(() => {
                            popup.classList.add('show');
                        });
                    }, delay);

                    msgIdx++;
                }
                totalDelay += countInRow * baseDelay + 100;
            }

            setTimeout(() => {
                popupHint.classList.add('show');
            }, totalDelay + 500);
        }

        function hidePopups() {
            const popupContainer = document.getElementById('popupContainer');
            const popupHint = document.getElementById('popupHint');

            popupHint.classList.remove('show');

            document.querySelectorAll('.popup.show').forEach((popup, index) => {
                setTimeout(() => {
                    popup.style.transform = 'scale(0) translateY(30px)';
                    popup.style.opacity = '0';
                    setTimeout(() => popup.remove(), 300);
                }, index * 80);
            });

            setTimeout(() => {
                popupContainer.classList.remove('show');
                popupsShown = false;
            }, 1000);
        }
        
        function restartAnimation() {
            document.getElementById('restartBtn').classList.remove('show');
            hidePopups();

            fireworks = [];
            particles = [];
            currentTextParticles = [];
            cakes = [];
            colorBalls = [];
            
            if (cakeSpawnInterval) {
                clearInterval(cakeSpawnInterval);
                cakeSpawnInterval = null;
            }
            
            if (fireworkInterval) {
                clearInterval(fireworkInterval);
                fireworkInterval = null;
            }
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            ctx.fillStyle = 'rgba(10, 10, 32, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            setTimeout(() => {
                startCountdown();
            }, 500);
        }
    </script>
